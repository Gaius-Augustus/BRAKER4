; Shared biology configuration for all HPC test scenarios.
;
; Every scenario in test_scenarios/ uses this single file via the
; BRAKER4_CONFIG environment variable (set by run_test.sh). Per-scenario
; deviations from these defaults are expressed as BRAKER4_* environment
; variable overrides in each scenario's scenario_overrides.sh.
;
; The compute side of the configuration (cpus_per_task, mem_of_node,
; max_runtime, partitions, etc.) lives in compute_profile.sh, NOT here.

[paths]
samples_file = samples.csv
augustus_config_path = augustus_config

[PARAMS]
run_best_by_compleasm = 1
run_omark = 0
skip_optimize_augustus = 1
skip_single_exon_downsampling = 0
downsampling_lambda = 2
use_varus = 0
use_compleasm_hints = 1
use_dev_shm = 0
gm_max_intergenic = 10000
run_ncrna = 0

# FANTASIA-Lite functional annotation. OFF in this shared HPC config; the
# scenario that exercises it (scenario_08_es) flips BRAKER4_RUN_FANTASIA=1
# in its scenario_overrides.sh. The container, GPU partition, and offline
# HuggingFace cache below are specific to the Hoff lab vision partition --
# adjust paths if you replicate these tests on another cluster.
[fantasia]
enable = 0
sif = /home/nas-hs/data/db/EukBinDB/images/fantasia_lite.sif
hf_cache_dir = /home/nas-hs/projs/fantasia-tiberius/hf_cache
partition = vision-fast
gpus = 1
mem_mb = 25000
cpus_per_task = 16
max_runtime = 120
min_score = 0.5
